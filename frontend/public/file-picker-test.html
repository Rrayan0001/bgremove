    />
    <title>File Picker Test</title>
    <style>
      body {
        font-family: sans-serif;
        margin: 40px;
      }

      .stack {
        display: flex;
        flex-direction: column;
        gap: 16px;
        max-width: 480px;
      }
    </style>
  </head>
  <body>
    <div class="stack">
      <h1>File Picker Test</h1>
      <p>If this button does not open the system file chooser, the issue is outside the React UI.</p>
      <input id="picker" type="file" accept=".jpg,.jpeg,.png,.webp" />
      <p id="status">No file selected.</p>
    </div>

    <script>
      const picker = document.getElementById('picker');
      const status = document.getElementById('status');
      let awaitingSelection = false;
      const supportsCancelEvent =
        typeof HTMLInputElement !== 'undefined' && 'oncancel' in HTMLInputElement.prototype;

      picker.addEventListener('click', () => {
        picker.value = '';
        awaitingSelection = true;
        status.textContent = 'Opening file chooser...';
      });

      picker.addEventListener('change', () => {
        awaitingSelection = false;
        status.textContent = picker.files?.[0]
          ? `Selected: ${picker.files[0].name}`
          : 'No file selected.';
      });

      if (supportsCancelEvent) {
        picker.addEventListener('cancel', () => {
          awaitingSelection = false;
          status.textContent = 'Chooser closed without selecting a file.';
        });
      } else {
        window.addEventListener('focus', () => {
          window.setTimeout(() => {
            if (awaitingSelection && !picker.files?.length) {
              awaitingSelection = false;
              status.textContent = 'Chooser closed without selecting a file.';
            }
          }, 250);
        });
      }
    </script>
  </body>
</html>
